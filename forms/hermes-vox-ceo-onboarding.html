const KEY='hermes_vox_ceo_onboarding_answers_v2';
let answers = JSON.parse(localStorage.getItem(KEY)||'{}');
let currentFilter='all';
function escapeHtml(value){return String(value||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');}
function save(){localStorage.setItem(KEY,JSON.stringify(answers)); updateProgress();}
function answered(q){const a=answers[q.id]||{}; return Boolean((a.text||'').trim() || (a.preset||'').trim());}
function setFilter(f, btn){currentFilter=f; document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render();}
function setPreset(id,val,btn){answers[id]=answers[id]||{}; answers[id].preset=val; const ta=document.querySelector(`[data-text="${id}"]`); if(ta && !ta.value.trim()){ta.value=val; answers[id].text=val;} document.querySelectorAll(`[data-chip="${id}"]`).forEach(b=>b.classList.remove('active')); btn.classList.add('active'); save();}
function setText(id,val){answers[id]=answers[id]||{}; answers[id].text=val; save();}
function filteredQuestions(){const needle=(document.getElementById('search')?.value||'').toLowerCase().trim(); return questions.filter(q=>{ if(currentFilter==='review') return false; if(currentFilter==='unanswered' && answered(q)) return false; if(['P0','P1','P2'].includes(currentFilter) && q.priority!==currentFilter) return false; if(needle && !(q.question+' '+q.id+' '+q.section).toLowerCase().includes(needle)) return false; return true; });}
function renderReview(){const p=payload(); const unanswered=p.answers.filter(a=>!a.answer && !a.preset).length; const lines=[`Answered: ${p.answers.length-unanswered} / ${p.answers.length}`, `Unanswered: ${unanswered}`, '', ...p.answers.map(a=>`[${a.priority}] ${a.id} — ${a.question}
Answer: ${a.answer||a.preset||'(empty)'}
`)]; return `<div class="section">Review before export</div><div class="review">${escapeHtml(lines.join('
'))}</div>`;}
function render(){const app=document.getElementById('app'); if(currentFilter==='review'){app.innerHTML=renderReview(); updateProgress(); return;} let html=''; let last=''; for(const q of filteredQuestions()){const sec=q.priority+' — '+q.section; if(sec!==last){html+=`<div class="section">${escapeHtml(sec)}</div>`; last=sec;} const a=answers[q.id]||{}; html+=`<div class="card"><div class="meta"><span class="pill ${q.priority.toLowerCase()}">${q.priority}</span><span class="pill">${escapeHtml(q.id)}</span></div><div class="q">${escapeHtml(q.question)}</div><div class="chips">${q.presets.map(p=>`<button type="button" class="chip ${a.preset===p?'active':''}" data-chip="${q.id}" onclick="setPreset('${q.id}', ${JSON.stringify(p)}, this)">${escapeHtml(p)}</button>`).join('')}</div><textarea data-text="${q.id}" placeholder="Write answer here..." oninput="setText('${q.id}', this.value)">${escapeHtml(a.text||'')}</textarea><div class="hint">Tip: one clear sentence is enough. Use “skip / answer later” if needed.</div></div>`;} app.innerHTML=html || '<div class="card">No questions match this filter.</div>'; updateProgress();}
function updateProgress(){const done=questions.filter(answered).length; document.getElementById('bar').style.width=(done/questions.length*100)+'%'; document.getElementById('count').textContent=`${done} / ${questions.length} answered`;}
function payload(){return {schema:'hermes_vox_ceo_onboarding_answers_v2', exported_at:new Date().toISOString(), source_page:location.href, answers:questions.map(q=>({id:q.id, priority:q.priority, section:q.section, question:q.question, preset:(answers[q.id]||{}).preset||'', answer:(answers[q.id]||{}).text||''}))};}
function blobFile(name, content, type){return new File([new Blob([content],{type})], name, {type});}
function dl(name,content,type){const b=new Blob([content],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href), 1000);}
function jsonText(){return JSON.stringify(payload(),null,2);}
function txtText(){return payload().answers.map(a=>`[${a.priority}] ${a.id} — ${a.question}
Answer: ${a.answer||a.preset||''}
`).join('
');}
